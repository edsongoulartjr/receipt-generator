services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: receipt_generator
      POSTGRES_USER: receipt_user
      POSTGRES_PASSWORD: receipt_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: src/ReceiptGenerator.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=receipt_generator;Username=receipt_user;Password=receipt_password
      JwtSettings__Secret: change-this-production-secret-with-at-least-32-characters
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data:
