<section class="auth-page">
    <div class="auth-panel">
        <div class="auth-heading">
            <span class="eyebrow">Coopertaxi Jundiaí SP</span>
            <h1>Entrar no sistema</h1>
            <p>Emissão de recibos para atendimento corporativo e controle operacional.</p>
        </div>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" [(ngModel)]="username" name="username" autocomplete="username"
                    required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" [(ngModel)]="password" name="password"
                    autocomplete="current-password" required>
            </div>
            @if (errorMessage) {
                <p class="form-error" role="alert">{{ errorMessage }}</p>
            }
            <button type="submit" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Conectando...' : 'Entrar' }}
            </button>
        </form>
        <p class="auth-link">Acesso de usuários autorizado pela administração da cooperativa.</p>
    </div>
</section>
