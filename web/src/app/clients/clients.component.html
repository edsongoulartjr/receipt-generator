<div class="clients-container">
    <h2>Clientes</h2>

    <div class="client-form">
        <h3>{{ editingClient ? 'Editar Cliente' : 'Adicionar Cliente' }}</h3>
        <form (ngSubmit)="saveClient()">
            <div class="form-group">
                <label for="name">Nome:</label>
                <input type="text" id="name" [(ngModel)]="currentClient.name" name="name" required>
            </div>
            <div class="form-group">
                <label for="address">Endereço:</label>
                <input type="text" id="address" [(ngModel)]="currentClient.address" name="address" required>
            </div>
            <div class="form-group">
                <label for="taxId">CPF/CNPJ:</label>
                <input type="text" id="taxId" [(ngModel)]="currentClient.taxId" name="taxId" required>
            </div>
            <button type="submit">{{ editingClient ? 'Atualizar' : 'Adicionar' }}</button>
            <button type="button" (click)="cancelEdit()" *ngIf="editingClient">Cancelar</button>
        </form>
    </div>

    <div class="clients-list">
        <h3>Clientes Cadastrados</h3>
        <ul>
            <li *ngFor="let client of clients">
                <div class="client-info">
                    <strong>{{ client.name }}</strong> (<span>{{ client.taxId }}</span>)<br>
                    <small>{{ client.address }}</small>
                </div>
                <div class="client-actions">
                    <button (click)="editClient(client)">Editar</button>
                    <button (click)="deleteClient(client.id!)">Excluir</button>
                </div>
            </li>
        </ul>
    </div>
</div>
