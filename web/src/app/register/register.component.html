<section class="auth-page">
    <div class="auth-panel">
        <div class="auth-heading">
            <span class="eyebrow">Acesso operacional</span>
            <h1>Cadastrar usuário</h1>
            <p>Crie um usuário para operar clientes e recibos da cooperativa.</p>
        </div>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" [(ngModel)]="username" name="username" autocomplete="username"
                    required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" [(ngModel)]="password" name="password"
                    autocomplete="new-password" required>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <p class="auth-link">Já tem acesso? <a routerLink="/login">Entrar no sistema</a></p>
    </div>
</section>
