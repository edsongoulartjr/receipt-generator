<div class="users-container">
    <h2>Usuários</h2>

    <div class="user-form">
        <h3>Novo Usuário</h3>
        <form (ngSubmit)="createUser()">
            <div class="form-grid">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" [(ngModel)]="currentUser.username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha inicial</label>
                    <input type="password" id="password" [(ngModel)]="currentUser.password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="role">Perfil</label>
                    <select id="role" [(ngModel)]="currentUser.role" name="role">
                        <option *ngFor="let role of roles" [ngValue]="role">
                            {{ role === 'SuperAdmin' ? 'Super administrador' : 'Operador' }}
                        </option>
                    </select>
                </div>
            </div>
            <button type="submit">Criar usuário</button>
        </form>
    </div>

    <div class="users-list">
        <h3>Usuários Cadastrados</h3>
        <p *ngIf="users.length === 0">Nenhum usuário cadastrado.</p>
        <table class="table" *ngIf="users.length > 0">
            <thead>
                <tr>
                    <th>Usuário</th>
                    <th>Perfil</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users">
                    <td>{{ user.username }}</td>
                    <td>{{ user.role === 'SuperAdmin' ? 'Super administrador' : 'Operador' }}</td>
                    <td>{{ user.isActive ? 'Ativo' : 'Inativo' }}</td>
                    <td>
                        <button class="btn btn-success btn-sm" *ngIf="!user.isActive" (click)="activate(user)">
                            Ativar
                        </button>
                        <button class="btn btn-danger btn-sm" *ngIf="user.isActive" (click)="deactivate(user)">
                            Desativar
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
