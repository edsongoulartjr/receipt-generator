<nav class="navbar">
    <a routerLink="/" class="navbar-brand" aria-label="Coopertaxi Jundiaí">
        <span class="brand-mark">CT</span>
        <span class="brand-copy">
            <strong>Coopertaxi Jundiaí</strong>
            <small>Recibos corporativos</small>
        </span>
    </a>
    <div class="navbar-links">
        <ng-container *ngIf="authService.isAuthenticated$ | async">
            <a routerLink="/clients" routerLinkActive="active" class="nav-link">Clientes</a>
            <a routerLink="/receipts" routerLinkActive="active" class="nav-link">Recibos</a>
            <a routerLink="/users" routerLinkActive="active" class="nav-link" *ngIf="authService.isSuperAdmin()">Usuários</a>
            <button (click)="logout()" class="nav-link logout-button">Sair</button>
        </ng-container>
        <ng-container *ngIf="!(authService.isAuthenticated$ | async)">
            <a routerLink="/login" routerLinkActive="active" class="nav-link">Entrar</a>
        </ng-container>
    </div>
</nav>
